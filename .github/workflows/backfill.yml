name: Backfill Past Reports

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Regenerate reports
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          READING_MODE: ${{ secrets.READING_MODE }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          START_DATE: ${{ secrets.START_DATE }}
          OUTPUT_DIR: ./data
        run: |
          python -c "
          from datetime import datetime, timedelta
          start = datetime.strptime('${{ inputs.start_date }}', '%Y-%m-%d').date()
          end = datetime.strptime('${{ inputs.end_date }}', '%Y-%m-%d').date()
          d = start
          while d <= end:
              print(d.isoformat())
              d += timedelta(days=1)
          " | while read dt; do
            echo "=== Generating report for $dt ==="
            python generate_daily_report.py "$dt"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily data/books-index.json || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Backfill reports: ${{ inputs.start_date }} ~ ${{ inputs.end_date }}"
          git push
